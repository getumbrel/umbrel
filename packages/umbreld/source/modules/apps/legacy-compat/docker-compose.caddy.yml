version: '3.7'

services:
  caddy:
    container_name: umbrel_caddy
    image: getumbrel/caddy:2.7.6
    # Uncomment below to build from source
    # build:
    #   dockerfile: containers/caddy/Dockerfile
    #   context: ../../../../../../
    user: '1000:1000'
    restart: on-failure
    ports:
      - '${CADDY_HTTP_PORT:-80}:${CADDY_HTTP_PORT:-80}'
      - '${CADDY_HTTPS_PORT:-443}:${CADDY_HTTPS_PORT:-443}'
    volumes:
      - ${UMBREL_DATA_DIR}/caddy:/config
      - ${UMBREL_DATA_DIR}/caddy/certs:/certs:ro
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-umbrel.local}
      CADDY_HTTP_PORT: ${CADDY_HTTP_PORT:-80}
      CADDY_HTTPS_PORT: ${CADDY_HTTPS_PORT:-443}
    networks:
      default:
        ipv4_address: $CADDY_IP

networks:
  default:
    name: umbrel_main_network
    ipam:
      driver: default
      config:
        - subnet: '$NETWORK_IP/16'
